<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Apple Music Style</title>
    <link rel="stylesheet" href="css/admin-style.css">
    <link rel="stylesheet" href="css/auth-style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div class="auth-wrapper">
        <button class="theme-toggle-btn" onclick="toggleTheme()" id="themeIcon"></button>
        <div class="auth-card">
            <div class="auth-header">
                <h2>Apple Music</h2>
                <span class="auth-subtitle">Admin Console</span>
            </div>
            
            <div id="loginFormContainer">
                <h1 class="auth-title">Sign In</h1>
                <p class="auth-desc">Manage your music library and settings.</p>
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <input type="text" id="loginUsername" placeholder="Username" required class="auth-input">
                    <input type="password" id="loginPassword" placeholder="Password" required class="auth-input">
                    <button type="submit" class="auth-btn">Sign In</button>
                    <div id="loginError" class="auth-error"></div>
                </form>
                <div class="auth-switch">
                    Don't have an account? <a href="#" onclick="switchAuthMode('register')">Create one</a>
                </div>
            </div>

            <div id="registerFormContainer" style="display: none;">
                <h1 class="auth-title">Create Account</h1>
                <form id="registerForm" onsubmit="handleRegister(event)">
                    <input type="text" id="regUsername" placeholder="Username" required class="auth-input">
                    <input type="password" id="regPassword" placeholder="Password" required class="auth-input">
                    <button type="submit" class="auth-btn">Register</button>
                    <div id="regError" class="auth-error"></div>
                </form>
                <div class="auth-switch">
                    Already have an account? <a href="#" onclick="switchAuthMode('login')">Sign in</a>
                </div>
            </div>

            <div style="margin-top: 24px; text-align: center; border-top: 1px solid var(--border-color); padding-top: 24px; display: flex; justify-content: center;">
                <div id="g_id_onload"
                     data-client_id="YOUR_GOOGLE_CLIENT_ID"
                     data-context="use"
                     data-ux_mode="popup"
                     data-callback="handleGoogleCredentialResponse"
                     data-auto_prompt="false">
                </div>
                <div class="g_id_signin"
                     data-type="standard"
                     data-shape="pill"
                     data-theme="outline"
                     data-text="continue_with"
                     data-size="large"
                     data-logo_alignment="left">
                </div>
            </div>
            
            <a href="index.html" class="back-link">Return to Player</a>
        </div>
    </div>
    
    <script src="js/theme.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
