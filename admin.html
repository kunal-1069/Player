<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Apple Music Style</title>
    <link rel="stylesheet" href="css/admin-style.css">
</head>

<body>
    <div class="admin-sidebar"
        style="width: 260px; background: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 20px;">
        <div class="sidebar-header" style="margin-bottom: 30px;">
            <h2 style="font-size: 1.25rem; font-weight: 700;">Apple Music</h2>
            <span
                style="font-size:0.75rem; color:#86868b; font-weight:600; text-transform:uppercase; margin-left:12px; display:block; margin-top:4px;">Admin
                Console</span>
        </div>

        <nav class="sidebar-nav" style="display: flex; flex-direction: column; gap: 8px;">
            <a href="index.html" class="nav-btn" style="text-decoration: none;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M15 18l-6-6 6-6" />
                </svg>
                Back to Player
            </a>
            <button onclick="logout()" class="nav-btn"
                style="margin-top: 8px; color: var(--danger-color); text-align: left; background: none; border: none; cursor: pointer; padding: 10px 12px; display: flex; gap: 12px; align-items: center; border-radius: 8px; font-size: 0.95rem; font-weight: 500;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Logout
            </button>
        </nav>
    </div>

    <div class="admin-main" style="flex: 1; overflow-y: auto; padding: 40px; background: var(--bg-main);">
        <button class="theme-toggle-btn" onclick="toggleTheme()" id="themeIcon"
            style="position: absolute; top: 20px; right: 20px;"></button>
        <div class="admin-container" style="max-width: 800px; margin: 0 auto;">
            <div class="admin-header" style="margin-bottom: 40px;">
                <h1 style="font-size: 2.5rem; font-weight: 700; letter-spacing: -0.5px;">Manage Library</h1>
            </div>

            <div class="upload-section">
                <h2>Import to Library</h2>

                <div class="upload-tabs">
                    <button class="tab-btn active" onclick="switchUploadTab('single')">Single Song</button>
                    <button class="tab-btn" onclick="switchUploadTab('batch')">Folder Import</button>
                </div>

                <!-- Single Song Form -->
                <div id="singleUploadForm">
                    <div class="form-group">
                        <input type="text" id="songTitle" placeholder="Song Title">
                        <input type="text" id="artistName" placeholder="Artist Name">
                    </div>
                    <!-- Native file inputs are hard to style, we keep it simple -->
                    <input type="file" id="songFile" accept="audio/*" class="file-input">

                    <div id="uploadProgress" class="progress-bar" style="display: none;">
                        <div class="progress-fill"></div>
                    </div>

                    <button onclick="uploadSong()" class="upload-btn">Upload Song</button>
                </div>

                <!-- Batch / Folder Form -->
                <div id="batchUploadForm" style="display: none;">
                    <p style="color:var(--text-secondary); margin-bottom: 16px; font-size:0.9rem;">
                        Select a folder containing MP3 files. Title and Artist will be automatically extracted from the
                        file metadata (ID3 tags).
                    </p>
                    <input type="file" id="folderFiles" accept="audio/*" multiple webkitdirectory directory
                        class="file-input">
                    <div id="batchUploadProgress" class="progress-bar" style="display: none;">
                        <div class="progress-fill" id="batchProgressFill"></div>
                    </div>
                    <div id="batchStatus" style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom:16px;">
                    </div>
                    <button onclick="uploadFolder()" class="upload-btn" id="batchUploadBtn">Import Folder</button>
                </div>
            </div>

            <div class="manage-section">
                <h2>Library Overview</h2>
                <div id="songsList" class="admin-songs-list"></div>
            </div>
        </div>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/admin.js"></script>

    <style>
        body {
            display: flex;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        .nav-btn:hover {
            background: var(--bg-hover);
        }
    </style>
</body>

</html>
